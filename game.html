<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Rush</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <script src="game.js" defer></script>
</head>
<body>
    <div class="bg-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- ホームへ戻るボタン -->
    <a href="index.html" class="back-button">← Home</a>

    <div class="game-container">
        <div class="phone">
            <div class="phone-notch"></div>
            
            <div class="status-bar">
                <span id="clock" class="time">12:00</span>
                <span class="icons">📶 100% 🔋</span>
            </div>

            <!-- Clear Toggle Button -->
            <div class="drawer-toggle-btn" id="drawer-toggle-btn">
                ▼ 通知センターを開く <span id="notif-badge" class="notif-badge hidden">0</span>
            </div>

            <div id="phone-bg-effects" class="phone-bg-effects"></div>
            
            <div class="game-header">
                <div class="score-container">
                    Stage: <span id="stage-display">1</span>
                    <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px;">Score: <span id="score">0</span></div>
                    <div id="combo-display" class="combo-display hidden">Combo x<span id="combo-count">0</span>!</div>
                </div>
                <div class="stress-container">
                    Stress
                    <div class="stress-bar-bg">
                        <div id="stress-bar" class="stress-bar-fill"></div>
                    </div>
                </div>
            </div>

            <!-- The 2D Game App Window -->
            <div class="app-window">
                <canvas id="mini-game-canvas" class="mini-game-canvas" width="340" height="500"></canvas>
            </div>

            <!-- Transient Banner Area -->
            <div id="banner-area" class="banner-area"></div>

            <!-- Notification Drawer -->
            <div id="notification-drawer" class="notification-drawer">
                <div class="drawer-handle"></div>
                <div class="drawer-title">通知センター</div>
                <!-- 通知エリア -->
                <div id="notification-area" class="notification-area">
                    <!-- Notifications will be injected here by JS -->
                </div>
            </div>

            <!-- UI Overlay: Start / Game Over -->
            <div id="overlay" class="overlay">
                <div id="start-screen" class="screen">
                    <h1>Notification Rush</h1>
                    <p>次々と来る通知を正しくさばけ！</p>
                    <ul class="rules">
                        <li>💬 メッセージは「返信」</li>
                        <li>❤️ SNSは「いいね」</li>
                        <li>⚠️ スパムは「削除」</li>
                    </ul>
                    <p>放置するとストレスが溜まるぞ！</p>
                    <button id="start-btn" class="btn primary-btn">START</button>
                </div>

                <div id="game-over-screen" class="screen hidden">
                    <h1>Game Over</h1>
                    <p>ストレスが限界に達しました...</p>
                    <div class="final-score">Score: <span id="final-score-value">0</span></div>
                    <button id="restart-btn" class="btn primary-btn">RETRY</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
